name: Update all_uzb_iptv_providers playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build filtered playlist
        run: node all_uzb_iptv_providers.js

      - name: Commit updated playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add all_uzb_iptv_providers.m3u8
          git diff --cached --quiet && exit 0
          git commit -m "Update all_uzb_iptv_providers.m3u8"
          git push
