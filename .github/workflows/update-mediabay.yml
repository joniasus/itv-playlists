name: Update mediabay_uz.js and all_uzb_iptv_providers.js

on:
  workflow_dispatch:
  schedule:
    - cron: '7 */3 * * *'
      timezone: 'Asia/Tashkent'

permissions:
  contents: write

concurrency:
  group: update-playlists-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build mediabay_uz.m3u8
        run: node mediabay__uz.js

      - name: Build merged all_uzb_iptv_providers.m3u8
        run: node all_uzb_iptv_providers.js

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mediabay__uz.m3u8 all_uzb_iptv_providers.m3u8

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update playlists"
          git pull --rebase origin "$DEFAULT_BRANCH"
          git push origin "HEAD:$DEFAULT_BRANCH"
