name: Update Playlists

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'itv_uz.js'
      - 'all_uzb_iptv_providers.js'
      - '.github/workflows/update-playlists.yml'
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Build iTV playlist
        run: node itv_uz.js

      - name: Build merged playlist
        run: node all_uzb_iptv_providers.js

      - name: Show generated files
        run: |
          ls -lh
          test -f iTV_UZ.m3u8 && echo "iTV_UZ.m3u8 ready"
          test -f all_uzb_iptv_providers.m3u8 && echo "all_uzb_iptv_providers.m3u8 ready"
          echo "iTV count:"
          grep -c '^#EXTINF:' iTV_UZ.m3u8 || true
          echo "ALL count:"
          grep -c '^#EXTINF:' all_uzb_iptv_providers.m3u8 || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add iTV_UZ.m3u8 all_uzb_iptv_providers.m3u8

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update playlists"
          git push
