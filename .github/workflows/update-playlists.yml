name: Update Playlists

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'itv_uz.js'
      - 'all_uzb_iptv_providers.js'
      - '.github/workflows/update-playlists.yml'
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show versions
        run: |
          node -v
          npm -v

      - name: Build iTV playlist
        run: node itv_uz.js

      - name: Build merged playlist
        run: node all_uzb_iptv_providers.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add iTV_UZ.m3u8 iTV_UZ_SOURCE.m3u8 iTV_UZ_API.m3u8 all_uzb_iptv_providers.m3u8 \
                  API_ONLY_STREAM_IDS.txt API_ONLY_CHANNEL_IDS.txt API_ONLY_CHANNEL_IDS.js \
                  API_ONLY_DETAILS.txt SOURCE_ONLY_STREAM_IDS.txt MISSING_STREAM_IDS.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update playlists"

          git pull --rebase origin main
          git push origin HEAD:main
