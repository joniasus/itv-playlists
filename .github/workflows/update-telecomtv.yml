name: Update TelocomTV Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '35 21 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        run: node telecomtv_uz.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telecomtv_uz.m3u8
          git diff --cached --quiet || git commit -m "Update telecomtv_uz.m3u8"
          git push