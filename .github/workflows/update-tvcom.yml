name: Update tvcom_uz.js and all_uzb_iptv_providers.js

on:
  workflow_dispatch:
  schedule:
    - cron: '37 02 */2 * *'
      timezone: 'Asia/Tashkent'

permissions:
  contents: write

concurrency:
  group: update-playlists-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build tvcom_uz.m3u8
        run: node tvcom_uz.js

      - name: Build merged all_uzb_iptv_providers.m3u8
        run: node all_uzb_iptv_providers.js

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tvcom_uz.m3u8 all_uzb_iptv_providers.m3u8

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update playlists"

          for i in 1 2 3 4 5; do
            echo "Push attempt $i/5"
            git rebase --abort || true

            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi

            sleep $((i * 15))
          done
