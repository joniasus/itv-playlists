name: Update tvcom and Merge Playlists

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
      timezone: 'Asia/Tashkent'

permissions:
  contents: write

concurrency:
  group: update-tvcom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-tvcom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build tvcom_uz.m3u8
        run: node tvcom_uz.js

      - name: Build merged all_uzb_iptv_providers.m3u8
        run: node all_uzb_iptv_providers.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tvcom_uz.m3u8 all_uzb_iptv_providers.m3u8

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update tvcom and merged playlists"
          git pull --rebase origin main
          git push origin HEAD:main
