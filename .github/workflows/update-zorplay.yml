name: Update zorplay_uz.js and all_uzb_iptv_providers.js

on:
  workflow_dispatch:
  schedule:
    # self-healing watchdog: off-top-of-hour poll
    - cron: '7,22,37,52 * * * *'
      timezone: 'Asia/Tashkent'

permissions:
  contents: write
  actions: read

concurrency:
  group: update-playlists-${{ github.ref }}
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      run_build: ${{ steps.gate.outputs.run_build }}
      reason: ${{ steps.gate.outputs.reason }}
      due_at: ${{ steps.gate.outputs.due_at }}
      last_success: ${{ steps.gate.outputs.last_success }}

    steps:
      - name: Decide whether build is due
        id: gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import datetime
          from zoneinfo import ZoneInfo

          out = os.environ["GITHUB_OUTPUT"]
          event = os.environ["GITHUB_EVENT_NAME"]

          def write_output(key, value):
              with open(out, "a", encoding="utf-8") as f:
                  f.write(f"{key}={value}\n")

          # Manual run => always run immediately
          if event == "workflow_dispatch":
              write_output("run_build", "true")
              write_output("reason", "manual_dispatch")
              write_output("due_at", "manual")
              write_output("last_success", "")
              sys.exit(0)

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          workflow_ref = os.environ["GITHUB_WORKFLOW_REF"]
          token = os.environ["GITHUB_TOKEN"]

          # Extract workflow file name from github.workflow_ref
          # example: owner/repo/.github/workflows/update.yml@refs/heads/main
          workflow_file = workflow_ref.split("@", 1)[0].rsplit("/", 1)[-1]

          url = (
              f"https://api.github.com/repos/{repo}"
              f"/actions/workflows/{workflow_file}/runs?per_page=20"
          )

          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "self-healing-playlist-workflow",
              },
          )

          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          last_success = None
          for run in data.get("workflow_runs", []):
              if str(run.get("id")) == str(run_id):
                  continue
              if run.get("conclusion") != "success":
                  continue

              ts = run.get("updated_at") or run.get("run_started_at") or run.get("created_at")
              if not ts:
                  continue

              last_success = datetime.datetime.fromisoformat(ts.replace("Z", "+00:00"))
              break

          tz = ZoneInfo("Asia/Tashkent")
          now_local = datetime.datetime.now(tz)

          # Original desired fixed slots:
          # 00:37, 05:37, 10:37, 15:37, 20:37
          target_hours = [0, 5, 10, 15, 20]

          due_local = None
          for hour in reversed(target_hours):
              candidate = now_local.replace(hour=hour, minute=37, second=0, microsecond=0)
              if candidate <= now_local:
                  due_local = candidate
                  break

          if due_local is None:
              yesterday = now_local.date() - datetime.timedelta(days=1)
              due_local = datetime.datetime(
                  yesterday.year, yesterday.month, yesterday.day,
                  20, 37, 0, 0, tzinfo=tz
              )

          due_utc = due_local.astimezone(datetime.timezone.utc)

          should_run = last_success is None or last_success < due_utc

          write_output("run_build", "true" if should_run else "false")
          write_output("reason", "scheduled_slot_due" if should_run else "already_ran_for_current_slot")
          write_output("due_at", due_local.isoformat())
          write_output("last_success", last_success.isoformat() if last_success else "")
          PY

      - name: Show gate result
        run: |
          echo "run_build    = ${{ steps.gate.outputs.run_build }}"
          echo "reason       = ${{ steps.gate.outputs.reason }}"
          echo "due_at       = ${{ steps.gate.outputs.due_at }}"
          echo "last_success = ${{ steps.gate.outputs.last_success }}"

  update:
    needs: decide
    if: needs.decide.outputs.run_build == 'true'
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Print run reason
        run: |
          echo "reason       = ${{ needs.decide.outputs.reason }}"
          echo "due_at       = ${{ needs.decide.outputs.due_at }}"
          echo "last_success = ${{ needs.decide.outputs.last_success }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build zorplay_uz.m3u8
        run: node zorplay_uz.js

      - name: Build merged all_uzb_iptv_providers.m3u8
        run: node all_uzb_iptv_providers.js

      - name: Commit and push if changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add zorplay_uz.m3u8 all_uzb_iptv_providers.m3u8

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update playlists"

          for i in 1 2 3 4 5; do
            echo "Push attempt $i/5"
            git rebase --abort || true

            if git pull --rebase origin "$DEFAULT_BRANCH" && git push origin "HEAD:$DEFAULT_BRANCH"; then
              echo "Push succeeded"
              exit 0
            fi

            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi

            sleep $((i * 15))
          done
